name: autovmware-macos-vmx-clone
version: 0.2.1
description: 在 Windows AutoVMware 主机上安全检查、计划并审批 macOS VMware VMX 批量克隆。
commands:
  setup:
    description: 帮运维用自然语言配置默认克隆参数，然后运行只读 doctor 检查。
    inputs:
      - name: source_vmx
        type: string
        required: false
        description: 要写入配置的源 VMX 路径。
      - name: target_root
        type: string
        required: false
        description: 要写入配置的克隆输出目录。
      - name: natural_language_request
        type: string
        required: false
        description: 运维用自然语言描述的 VMware 克隆配置需求。
    outputs:
      type: object
      description: 配置摘要、doctor 检查结果和人工校验说明。
  clone:
    description: 把简单数字理解为克隆数量，按默认配置生成审批文件和计划，并等待人工确认。
    inputs:
      - name: count
        type: integer
        required: true
        description: 克隆数量，必须是 1 到 100。
    outputs:
      type: object
      description: 审批文件、目标路径计划和人工确认提示。
  discover:
    description: 只读搜索可能的 macOS VMware .vmx 和磁盘剩余空间。
    inputs:
      - name: drive
        type: string
        required: false
        default: F
        pattern: "^[A-Za-z]$"
        description: 要检查的 Windows 盘符。
      - name: format
        type: string
        required: false
        default: json
        enum: [json, markdown]
        description: 输出格式。
    outputs:
      type: object
      description: 候选 VMX、磁盘空间、克隆工具线索和禁止动作状态。
  validate-approval:
    description: 检查人工审批 JSON，不执行虚拟机动作。
    inputs:
      - name: approval_json
        type: string
        required: true
        description: 审批 JSON 路径。
    outputs:
      type: object
      description: 校验结果和标准化后的审批内容。
  plan-clone:
    description: 根据审批参数生成确定的克隆计划，不执行克隆。
    inputs:
      - name: approval_json
        type: string
        required: true
        description: 审批 JSON 路径。
      - name: format
        type: string
        required: false
        default: json
        enum: [json, markdown]
        description: 输出格式。
    outputs:
      type: object
      description: 已校验的克隆计划和安全检查结果。
  generate-approval:
    description: 根据默认配置和克隆数量生成审批 JSON，不执行虚拟机动作。
    inputs:
      - name: count
        type: integer
        required: true
        description: 克隆数量，必须是 1 到 100。
      - name: config
        type: string
        required: false
        default: skills/autovmware-macos-vmx-clone/config/defaults.json
        description: 默认配置路径。
      - name: output
        type: string
        required: false
        default: config/autovmware-macos-vmx-clone.approval.json
        description: 审批 JSON 输出路径。
    outputs:
      type: object
      description: 审批文件路径和安全状态。
  doctor:
    description: 只读检查配置、源 VMX、VMware CLI、Kimi CLI 和磁盘空间。
    inputs:
      - name: config
        type: string
        required: false
        default: skills/autovmware-macos-vmx-clone/config/defaults.json
        description: 要检查的配置路径。
      - name: format
        type: string
        required: false
        default: markdown
        enum: [json, markdown]
        description: 输出格式。
    outputs:
      type: object
      description: 只读检查项、阻断项和禁止动作状态。
  report-template:
    description: 生成阶段报告模板，用来记录克隆验证证据。
    inputs:
      - name: approval_json
        type: string
        required: true
        description: 审批 JSON 路径。
      - name: output
        type: string
        required: true
        description: 报告输出路径。
    outputs:
      type: object
      description: 报告路径和需要填写的证据字段。
metadata:
  hermes:
    tags:
      - autovmware
      - vmware
      - macos
      - dem009
      - safety
